<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>뷰스트 마케팅 허브</title>
<style>
:root{--bg:#eaf1f2;--card:#fff;--ink:#0c1a1d;--soft:#4a5c60;--faint:#7d9195;--accent:#0d7c86;--accent2:#12a3ae;--line:#d3e0e1;--wash:#dceff0}
@media(prefers-color-scheme:dark){:root{--bg:#081315;--card:#0f1f22;--ink:#e7f1f1;--soft:#9db1b3;--faint:#6b8083;--accent:#2bc0cc;--accent2:#4dd6e0;--line:#22383c;--wash:#0f2e32}}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased}
.wrap{max-width:560px;margin:0 auto;padding:34px 20px 60px}
.hd{background:linear-gradient(125deg,#0d7c86,#0a5a63);border-radius:18px;padding:26px 24px;color:#fff;margin-bottom:22px}
.hd .e{font-size:11px;letter-spacing:.16em;text-transform:uppercase;opacity:.85;font-weight:700}
.hd h1{margin:7px 0 4px;font-size:25px;font-weight:800;letter-spacing:.02em}
.hd p{margin:0;opacity:.9;font-size:13.5px}
.menu{display:flex;flex-direction:column;gap:13px}
a.card{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--line);border-radius:15px;
  padding:19px 20px;text-decoration:none;color:inherit;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.04)}
a.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.ic{width:48px;height:48px;flex:none;border-radius:13px;background:var(--wash);display:grid;place-items:center;font-size:24px}
.tx{flex:1}
.tx .t{font-size:17px;font-weight:800}
.tx .d{font-size:13px;color:var(--faint);margin-top:2px}
.arw{color:var(--faint);font-size:20px;font-weight:700}
.foot{margin-top:26px;text-align:center;font-size:11.5px;color:var(--faint);line-height:1.7}
</style></head><body><div class="wrap">
<div class="hd">
  <div class="e">VIEWST · 제주 산방산 오션뷰</div>
  <h1>뷰스트 마케팅 허브</h1>
  <p>키워드·순위·트렌드를 한 곳에서 — 매일 자동 업데이트</p>
</div>
<div class="menu">
  <a class="card" href="morning.html">
    <div class="ic">☀️</div>
    <div class="tx"><div class="t">오늘의 모닝 리포트</div><div class="d">키워드·트렌드·뉴스·카페영상 + 실행 팁</div></div>
    <div class="arw">›</div>
  </a>
  <a class="card" href="place.html">
    <div class="ic">📍</div>
    <div class="tx"><div class="t">플레이스 순위</div><div class="d">타깃 키워드별 뷰스트 노출 순위 (매일 오후 1시)</div></div>
    <div class="arw">›</div>
  </a>
  <a class="card" href="dashboard.html">
    <div class="ic">📊</div>
    <div class="tx"><div class="t">키워드 전략 대시보드</div><div class="d">검색량·경쟁도·3단계 공략·주간 체크리스트</div></div>
    <div class="arw">›</div>
  </a>
</div>
<div class="foot">뷰스트 마케팅 자동화 · 네이버·유튜브 API 기반<br>북마크해두면 매일 최신 리포트를 볼 수 있어요</div>
</div></body></html>
